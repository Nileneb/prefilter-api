services:
  ui:
    build: .
    command: python app.py
    ports:
      - "7864:7864"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/data/uploads
      - LANGDOCK_WEBHOOK_URL=${LANGDOCK_WEBHOOK_URL:-}
      - GRADIO_USERNAME=${GRADIO_USERNAME:-}
      - GRADIO_PASSWORD=${GRADIO_PASSWORD:-}
      - ROOT_PATH=${ROOT_PATH:-}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/data/logs
      - HISTORY_DIR=/data/history
      - UPLOAD_STORE_DIR=/data/upload-store
      - FEEDBACK_DIR=/data/feedback
      - TZ=Europe/Berlin
    volumes:
      - uploads:/data/uploads
      - ./logs:/data/logs
      - history:/data/history
      - upload-store:/data/upload-store
      - feedback-data:/data/feedback
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: >
      celery -A src.worker.celery_app worker
      --pool=prefork
      --concurrency=${WORKER_CONCURRENCY:-4}
      --max-tasks-per-child=50
      --loglevel=info
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PARALLEL_THRESHOLD=${PARALLEL_THRESHOLD:-100000}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/data/logs
      - HISTORY_DIR=/data/history
      - UPLOAD_STORE_DIR=/data/upload-store
      - FEEDBACK_DIR=/data/feedback
    volumes:
      - uploads:/data/uploads
      - ./logs:/data/logs
      - history:/data/history
      - upload-store:/data/upload-store
      - feedback-data:/data/feedback
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY_LIMIT:-16G}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  uploads:
  history:
  upload-store:
  feedback-data:
